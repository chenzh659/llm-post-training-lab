# CI: smoke + unit tests (no model download, no GPU)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: smoke + pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install lightweight deps (no torch)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          # Core packages used by smoke/metrics without full training stack
          pip install "pyyaml>=6.0.2" "numpy>=1.26.0" "tqdm>=4.66.0"

      - name: Smoke test (no model download)
        run: python scripts/smoke_test.py

      - name: Pytest
        run: python -m pytest -q --tb=short

      - name: Schema / fixture sanity
        run: |
          python -c "from evaluation.build_test_suite import load_suite; xs=load_suite(None, prefer_fixture=True); assert len(xs)>=10; print('fixture', len(xs))"
